server:
  port: 9090

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/volticfit
    username: root
    password: ${MYSQL_PASSWORD:} # O tu contraseña directamente si no usas variables
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update # Muy importante para que no falle si las tablas ya existen
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

